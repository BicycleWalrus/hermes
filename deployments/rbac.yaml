apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeeye
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeeye
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeeye
subjects:
  - kind: ServiceAccount
    name: kubeeye
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeeye
